<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#165a72">
    <title>ConsultApp</title>
    <link rel="manifest" href="manifest.webmanifest">
    <link rel="icon" type="image/png" href="assets/consult-icon.png">
    <link rel="apple-touch-icon" href="assets/consult-icon-192.png">
    <script>
      try {
        if (sessionStorage.getItem("consultapp.showWelcomeAfterLogin") === "1") {
          document.documentElement.classList.add("has-pending-welcome");
        }
      } catch {}
    </script>
    <link rel="stylesheet" href="src/styles/app.css?v=347">
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <span class="brand-mark">C</span>
          <div>
            <strong>ConsultApp <span class="app-version" data-app-version>v347</span></strong>
            <small>Or&ccedil;amentos e servi&ccedil;os</small>
          </div>
        </div>
        <div class="sidebar-user" id="sidebar-user" hidden>
          <span id="current-user-name"></span>
          <span class="sidebar-user-actions">
            <button type="button" id="logout-app">Sair</button>
            <button type="button" class="nav-button sidebar-help-link" data-view="ajuda">Ajuda</button>
          </span>
        </div>
        <nav aria-label="Principal">
          <button class="nav-button is-active" data-view="dashboard">Dashboard</button>
          <button class="nav-button" data-view="clientes">Clientes</button>
          <button class="nav-button" data-view="servicos">Servi&ccedil;os</button>
          <button class="nav-button nav-menu-toggle" type="button" data-menu-group="financeiro" data-view="financeiro" aria-expanded="false">Financeiro</button>
          <button class="nav-button nav-menu-toggle" type="button" data-menu-group="administracao" aria-expanded="false">Administra&ccedil;&atilde;o</button>
          <button class="nav-button" data-view="ajuda">Ajuda</button>
          <div class="nav-submenu" data-submenu="financeiro" aria-label="Submenu Financeiro" hidden>
            <button class="nav-button nav-sub-button" data-view="orcamentos">Or&ccedil;amentos</button>
            <button class="nav-button nav-sub-button" data-view="relatorios">Relat&oacute;rios</button>
          </div>
          <div class="nav-submenu" data-submenu="administracao" data-admin-menu aria-label="Submenu Administra&ccedil;&atilde;o" hidden>
            <button class="nav-button nav-sub-button" data-view="usuarios">Usu&aacute;rios</button>
            <button class="nav-button nav-sub-button" data-view="arquivos">Arquivos</button>
            <button class="nav-button nav-sub-button" data-view="auditoria">Auditoria</button>
            <button class="nav-button nav-sub-button" data-view="documentacao">Documenta&ccedil;&atilde;o</button>
          </div>
        </nav>
        <section class="sidebar-tools" aria-label="Atalhos r&aacute;pidos">
          <h2>Atalhos r&aacute;pidos</h2>
          <div class="sidebar-actions">
            <button type="button" data-sidebar-new="clientes">+ Cliente</button>
            <button type="button" data-sidebar-new="servicos">+ Servi&ccedil;o</button>
            <button type="button" data-sidebar-new="orcamentos">+ Or&ccedil;amento</button>
            <button type="button" id="install-app" hidden>Instalar app</button>
          </div>
          <div class="sidebar-summary">
            <div><span id="side-label-one">Em an&aacute;lise</span><strong id="side-value-one">0</strong></div>
            <div><span id="side-label-two">Total</span><strong id="side-value-two">R$ 0,00</strong></div>
            <div><span id="side-label-three">&Uacute;ltimo</span><strong id="side-value-three">-</strong></div>
          </div>
        </section>
      </aside>

      <main class="content">
        <section class="view is-active" id="dashboard-view"></section>
        <section class="view" id="clientes-view"></section>
        <section class="view" id="servicos-view"></section>
        <section class="view" id="orcamentos-view"></section>
        <section class="view" id="financeiro-view"></section>
        <section class="view" id="relatorios-view"></section>
        <section class="view" id="arquivos-view"></section>
        <section class="view" id="usuarios-view"></section>
        <section class="view" id="auditoria-view"></section>
        <section class="view" id="documentacao-view"></section>
        <section class="view" id="ajuda-view"></section>
        <section class="print-area" id="print-area" aria-hidden="true"></section>
      </main>
    </div>

    <template id="empty-state-template">
      <div class="empty-state">
        <h2>Nenhum registro encontrado</h2>
        <p>Use o formul&aacute;rio acima para cadastrar o primeiro item.</p>
      </div>
    </template>

    <script src="src/data/seed.js?v=333"></script>
    <script src="src/app.js?v=347"></script>
  </body>
</html>
