services:
  - type: web
    name: consultapp-web
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_BACKEND
        value: postgres
      - key: DATABASE_URL
        sync: false
      - key: PGSSL
        value: "true"
      - key: PGSSL_REJECT_UNAUTHORIZED
        value: "false"
      - key: COOKIE_SECURE
        value: "true"
      - key: PUBLIC_APP_URL
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_SECURE
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false
      - key: SMTP_FROM_NAME
        sync: false
